<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сброс пароля</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: #f5f7fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 16px;
        }
        .container {
            background: white;
            padding: 32px 24px;
            border-radius: 24px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h2 {
            font-size: 28px;
            font-weight: 600;
            margin: 0 0 8px;
            color: #1f2937;
        }
        .subtitle {
            font-size: 14px;
            color: #6b7280;
            margin-bottom: 24px;
        }
        input {
            width: 100%;
            padding: 12px 16px;
            margin: 8px 0;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.2s;
            background: #f9fafb;
        }
        input:focus {
            outline: none;
            border-color: #3399ff;
            box-shadow: 0 0 0 3px rgba(51,153,255,0.1);
            background: white;
        }
        button {
            background: #3399ff;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 12px;
            width: 100%;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            margin-top: 16px;
            transition: background 0.2s;
        }
        button:hover {
            background: #287dcc;
        }
        button:disabled {
            background: #9ac5f0;
            cursor: not-allowed;
        }
        .message {
            margin-top: 16px;
            padding: 10px;
            border-radius: 10px;
            font-size: 14px;
        }
        .error {
            background: #fee2e2;
            color: #dc2626;
        }
        .success {
            background: #dcfce7;
            color: #16a34a;
        }
        .requirement {
            font-size: 12px;
            color: #6b7280;
            text-align: left;
            margin-top: 4px;
            margin-bottom: 4px;
        }
        .requirement.valid {
            color: #16a34a;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>Сброс пароля</h2>
    <div class="subtitle">Придумайте новый пароль</div>
    <input type="password" id="password" placeholder="Новый пароль" autocomplete="off">
    <input type="password" id="confirm" placeholder="Подтвердите пароль" autocomplete="off">
    <div class="requirement" id="req-length">✗ Не менее 6 символов</div>
    <div class="requirement" id="req-letter">✗ Содержать буквы (A-z, А-я)</div>
    <div class="requirement" id="req-digit">✗ Содержать цифры (0-9)</div>
    <button id="submit-btn" onclick="resetPassword()">Сбросить пароль</button>
    <div id="message" class="message" style="display: none;"></div>
</div>

<script>
    const passwordInput = document.getElementById('password');
    const confirmInput = document.getElementById('confirm');
    const submitBtn = document.getElementById('submit-btn');
    const messageDiv = document.getElementById('message');
    const reqLength = document.getElementById('req-length');
    const reqLetter = document.getElementById('req-letter');
    const reqDigit = document.getElementById('req-digit');

    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    if (!token) {
        showMessage('Неверная ссылка для сброса пароля', 'error');
        submitBtn.disabled = true;
    }

    function validatePassword(password) {
        const hasMinLength = password.length >= 6;
        const hasLetter = /[A-Za-zА-Яа-я]/.test(password);
        const hasDigit = /\d/.test(password);
        return { hasMinLength, hasLetter, hasDigit };
    }

    function updateRequirements() {
        const password = passwordInput.value;
        const { hasMinLength, hasLetter, hasDigit } = validatePassword(password);
        reqLength.innerHTML = hasMinLength ? '✓ Не менее 6 символов' : '✗ Не менее 6 символов';
        reqLetter.innerHTML = hasLetter ? '✓ Содержать буквы (A-z, А-я)' : '✗ Содержать буквы (A-z, А-я)';
        reqDigit.innerHTML = hasDigit ? '✓ Содержать цифры (0-9)' : '✗ Содержать цифры (0-9)';
        reqLength.style.color = hasMinLength ? '#16a34a' : '#6b7280';
        reqLetter.style.color = hasLetter ? '#16a34a' : '#6b7280';
        reqDigit.style.color = hasDigit ? '#16a34a' : '#6b7280';
    }

    passwordInput.addEventListener('input', updateRequirements);
    confirmInput.addEventListener('input', updateRequirements);

    function showMessage(text, type) {
        messageDiv.textContent = text;
        messageDiv.className = `message ${type}`;
        messageDiv.style.display = 'block';
        setTimeout(() => {
            if (messageDiv.style.display === 'block') {
                messageDiv.style.display = 'none';
            }
        }, 5000);
    }

    async function resetPassword() {
        const password = passwordInput.value;
        const confirm = confirmInput.value;

        messageDiv.style.display = 'none';

        if (!password || !confirm) {
            showMessage('Заполните оба поля', 'error');
            return;
        }
        if (password !== confirm) {
            showMessage('Пароли не совпадают', 'error');
            return;
        }

        const { hasMinLength, hasLetter, hasDigit } = validatePassword(password);
        if (!hasMinLength || !hasLetter || !hasDigit) {
            showMessage('Пароль не соответствует требованиям', 'error');
            return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = 'Отправка...';

        try {
            const response = await fetch('https://ixugrsymrhsptbcckarr.supabase.co/functions/v1/reset-password-confirm', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token, new_password: password })
            });
            const result = await response.json();
            if (result.success) {
                showMessage('Пароль успешно изменён! Теперь вы можете войти в приложение.', 'success');
                passwordInput.value = '';
                confirmInput.value = '';
                setTimeout(() => {
                    window.location.href = 'carsharing://login';
                }, 3000);
            } else {
                showMessage('Ошибка: ' + result.error, 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Сбросить пароль';
            }
        } catch (err) {
            showMessage('Ошибка сети: ' + err.message, 'error');
            submitBtn.disabled = false;
            submitBtn.textContent = 'Сбросить пароль';
        }
    }
</script>
</body>
</html>
